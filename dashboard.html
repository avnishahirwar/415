<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#07122b,#2563eb);
min-height:100vh;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:32px;
font-weight:bold;
color:#38bdf8;
}

.dashboard{
max-width:1200px;
margin:auto;
}

.profile-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
display:flex;
align-items:center;
gap:20px;
margin-bottom:25px;
}

.profile-card img{
width:100px;
height:100px;
border-radius:50%;
border:4px solid #38bdf8;
}

.profile-info h2{
margin-bottom:5px;
}

.profile-info p{
color:#d1d5db;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.card h3{
color:#38bdf8;
margin-bottom:10px;
}

.permissions{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
margin-bottom:25px;
}

.permissions h2{
color:#38bdf8;
margin-bottom:15px;
}

video{
width:100%;
border-radius:15px;
margin-top:10px;
}

button{
background:#38bdf8;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.logout{
background:#ef4444;
color:white;
}

#map iframe{
width:100%;
height:300px;
border:none;
border-radius:15px;
}

audio{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="header">
<div class="logo">AVNISH</div>
<div>Premium Dashboard</div>
</div>

<div class="profile-card">

<img src="https://i.pravatar.cc/300" alt="Profile">

<div class="profile-info">

<h2 id="userEmail">Loading...</h2>

<p>CEO • Entrepreneur • Developer</p>

<p>Building Businesses & Global Personal Brand</p>

</div>

</div>

<div class="grid">

<div class="card">
<h3>Account Status</h3>
<p>✅ Active</p>
</div>

<div class="card">
<h3>Membership</h3>
<p>⭐ Premium</p>
</div>

<div class="card">
<h3>Downloads</h3>
<p>📂 12 Resources</p>
</div>

<div class="card">
<h3>Projects</h3>
<p>🚀 5 Active Projects</p>
</div>

</div>

<div class="permissions">

<h2>📍 Live Location</h2>

<p id="locationText">Loading...</p>

<div id="map"></div>

</div>

<div class="permissions">

<h2>📷 Live Camera</h2>

<video id="camera" autoplay playsinline></video>

</div>

<div class="permissions">

<h2>🎤 Voice Recorder</h2>

<button onclick="startRecording()">Start Recording</button>

<button onclick="stopRecording()">Stop Recording</button>

<audio id="audioPlayer" controls></audio>

</div>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<script>

const SUPABASE_URL =
"https://gtuycqunlihegsbvvsol.supabase.co";

const SUPABASE_KEY =
"sb_publishable_zFqzEsppitLusrbVtSakQQ_plPLsg-C";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function loadUser(){

const {
data:{user}
}
=
await supabaseClient.auth.getUser();

if(!user){

window.location.href="login.html";
return;

}

document.getElementById("userEmail").innerHTML =
user.email;

}

loadUser();

async function logout(){

await supabaseClient.auth.signOut();

window.location.href="login.html";

}

navigator.geolocation.getCurrentPosition(
(position)=>{

const lat=position.coords.latitude;
const lng=position.coords.longitude;

document.getElementById("locationText").innerHTML =
lat + ", " + lng;

document.getElementById("map").innerHTML =
`<iframe src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed"></iframe>`;

}
);

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({
video:true
});

document.getElementById("camera").srcObject =
stream;

}catch{

alert("Camera Permission Denied");

}

}

startCamera();

let recorder;
let audioChunks=[];

async function startRecording(){

const stream =
await navigator.mediaDevices.getUserMedia({
audio:true
});

recorder =
new MediaRecorder(stream);

audioChunks=[];

recorder.start();

recorder.ondataavailable=(e)=>{
audioChunks.push(e.data);
};

}

function stopRecording(){

recorder.stop();

recorder.onstop=()=>{

const blob =
new Blob(audioChunks);

const audioURL =
URL.createObjectURL(blob);

document.getElementById("audioPlayer").src =
audioURL;

};

}

</script>

</body>
</html>
