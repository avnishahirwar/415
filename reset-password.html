<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | Avnish Ahirwar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);
}

.container{

width:450px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.3);

color:white;

}

.logo{

text-align:center;

font-size:40px;

font-weight:bold;

color:#38bdf8;

margin-bottom:10px;

}

h1{

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

margin-bottom:30px;

color:#cbd5e1;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:none;

outline:none;

border-radius:10px;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:#38bdf8;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:white;

}

.message{

margin-top:20px;

text-align:center;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
AVNISH
</div>

<h1>
Reset Password
</h1>

<p class="subtitle">

Create your new secure password

</p>

<form id="resetPasswordForm">

<input
type="password"
id="password"
placeholder="New Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Update Password

</button>

</form>

<div
id="message"
class="message">
</div>

</div>

<script>

const SUPABASE_URL =
"https://gtuycqunlihegsbvvsol.supabase.co";

const SUPABASE_KEY =
"sb_publishable_zFqzEsppitLusrbVtSakQQ_plPLsg-C";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById(
"resetPasswordForm"
)
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const password =
document.getElementById(
"password"
).value;

const confirmPassword =
document.getElementById(
"confirmPassword"
).value;

const message =
document.getElementById(
"message"
);

if(
password !==
confirmPassword
){

message.innerHTML =
"Passwords do not match";

return;

}

const {error} =
await supabaseClient
.auth
.updateUser({

password:password

});

if(error){

message.innerHTML =
error.message;

return;

}

message.innerHTML =
"Password Updated Successfully";

setTimeout(()=>{

window.location.href =
"login.html";

},2000);

});

</script>

</body>

</html>
