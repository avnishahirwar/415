<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | Avnish Ahirwar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:450px;
padding:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
color:white;
}

.logo{
text-align:center;
font-size:40px;
font-weight:bold;
color:#38bdf8;
margin-bottom:10px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:30px;
color:#cbd5e1;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#38bdf8;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:white;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
color:#38bdf8;
text-decoration:none;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">AVNISH</div>

<h1>Create Account</h1>

<p class="subtitle">
Join the community
</p>

<form id="signupForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<div class="links">

<p>
Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>

<div id="message" class="message"></div>

</div>

<script>

const SUPABASE_URL =
"https://gtuycqunlihegsbvvsol.supabase.co";

const SUPABASE_KEY =
"sb_publishable_zFqzEsppitLusrbVtSakQQ_plPLsg-C";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("signupForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const message =
document.getElementById("message");

const {error} =
await supabaseClient.auth.signUp({

email,
password

});

if(error){

message.innerHTML =
error.message;

return;

}

message.innerHTML =
"Account created. Please check your email.";

});

</script>

</body>
</html>
