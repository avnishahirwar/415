<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Avnish Ahirwar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#2563eb);
}

.container{
width:400px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
color:white;
}

h1{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#38bdf8;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

p{
margin-top:20px;
text-align:center;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Login</h1>

<form>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

</body>
</html>
