<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Avnish Ahirwar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);
}

.container{

width:450px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.3);

color:white;

}

.logo{

text-align:center;

font-size:40px;

font-weight:bold;

color:#38bdf8;

margin-bottom:10px;

}

h1{

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

margin-bottom:30px;

color:#cbd5e1;

}

input{

width:100%;

padding:15px;

margin-bottom:20px;

border:none;

outline:none;

border-radius:10px;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:#38bdf8;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:white;

}

.message{

margin-top:20px;

text-align:center;

font-weight:bold;

}

.links{

margin-top:25px;

text-align:center;

}

.links a{

color:#38bdf8;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
AVNISH
</div>

<h1>
Forgot Password
</h1>

<p class="subtitle">

Enter your email address and
we'll send a password reset link.

</p>

<form id="resetForm">

<input
type="email"
id="email"
placeholder="Enter Email Address"
required>

<button type="submit">

Send Reset Link

</button>

</form>

<div
id="msg"
class="message">
</div>

<div class="links">

<a href="login.html">

← Back To Login

</a>

</div>

</div>

<script>

const SUPABASE_URL =
"https://gtuycqunlihegsbvvsol.supabase.co";

const SUPABASE_KEY =
"sb_publishable_zFqzEsppitLusrbVtSakQQ_plPLsg-C";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("resetForm")
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const msg =
document.getElementById(
"msg"
);

const {error} =
await supabaseClient
.auth
.resetPasswordForEmail(
email
);

if(error){

msg.innerHTML =
error.message;

return;

}

msg.innerHTML =
"Password reset link sent successfully.";

});

</script>

</body>
</html>
